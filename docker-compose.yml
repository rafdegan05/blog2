services:
  # ─── PostgreSQL Database ───
  db:
    image: postgres:16-alpine
    container_name: blogpodcast-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blogpodcast
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Next.js Application ───
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blogpodcast-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/blogpodcast?schema=public"
      NEXTAUTH_URL: "http://localhost:3000"
      AUTH_SECRET: "${AUTH_SECRET:-change-me-in-production}"
      AUTH_TRUST_HOST: "true"
      GITHUB_ID: "${GITHUB_ID:-}"
      GITHUB_SECRET: "${GITHUB_SECRET:-}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      KEYCLOAK_ISSUER: "${KEYCLOAK_ISSUER:-}"
      KEYCLOAK_CLIENT_ID: "${KEYCLOAK_CLIENT_ID:-}"
      KEYCLOAK_CLIENT_SECRET: "${KEYCLOAK_CLIENT_SECRET:-}"
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

  # ─── Prisma Studio (dev only) ───
  studio:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: blogpodcast-studio
    profiles:
      - dev
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/blogpodcast?schema=public"
    depends_on:
      db:
        condition: service_healthy
    command: pnpm prisma studio --port 5555 --hostname 0.0.0.0

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
